name: Release Plugin

on:
  release:
    types: [created]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Buat ZIP plugin
        run: |
          mkdir -p dist/wagy-connect
          rsync -av --exclude='.git' \
                    --exclude='.github' \
                    --exclude='dist' \
                    ./ dist/wagy-connect/
          cd dist && zip -r ../wagy-connect.zip wagy-connect/

      - name: Upload ke Release
        uses: softprops/action-gh-release@v2
        with:
          files: wagy-connect.zip